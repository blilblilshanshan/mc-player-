<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MC老玩家鉴定器 - 测试你是否是真正的Minecraft老玩家">
    <meta name="keywords" content="Minecraft, MC, 游戏, 测试, 问卷">
    <title>MC老玩家鉴定器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app" class="app-container"></div>

    <!-- 页面容器 -->
    <div id="home-page" class="page hidden">
        <div class="home-container">
            <div class="logo">
                <h1>MC老玩家</h1>
                <h2>鉴定器</h2>
            </div>
            <div class="description">
                <p>你真的是MC老玩家吗？</p>
                <p class="subtitle">用20道经典问题测试你的MC知识</p>
            </div>
            <button class="btn btn-primary" id="start-btn">开始测试</button>
            <div class="footer-text">
                <p>⚒️ 由粉丝为粉丝创作</p>
            </div>
        </div>
    </div>

    <!-- 答题页面 -->
    <div id="quiz-page" class="page hidden">
        <div class="quiz-container">
            <div class="progress-wrapper">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <p class="progress-text"><span id="current-question">1</span> / <span id="total-questions">20</span></p>
            </div>

            <div class="question-card">
                <h3 class="question-text" id="question-text">Loading...</h3>
                <div class="options-container" id="options-container">
                    <!-- 选项动态生成 -->
                </div>
            </div>

            <div class="easter-egg" id="easter-egg"></div>
        </div>
    </div>

    <!-- 结算页面 -->
    <div id="result-page" class="page hidden">
        <div class="result-container">
            <div class="score-display">
                <p class="label">你的分数</p>
                <p class="score" id="final-score">0</p>
            </div>

            <div class="rank-card">
                <p class="rank-label">你的段位</p>
                <p class="rank-title" id="rank-title">计算中...</p>
                <p class="rank-description" id="rank-description">准备加载描述...</p>
            </div>

            <div class="action-buttons">
                <button class="btn btn-primary" id="share-btn">分享结果</button>
                <button class="btn btn-secondary" id="restart-btn">重新开始</button>
            </div>

            <div class="stats">
                <h4>答题统计</h4>
                <p>正确率: <span id="accuracy">0</span>%</p>
                <p>用时: <span id="time-spent">0</span> 秒</p>
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
